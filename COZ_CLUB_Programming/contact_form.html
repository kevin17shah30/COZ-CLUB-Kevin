<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Contact Us</title>
        <style>
            *{
                box-sizing: border-box;
                margin:0;
                padding:0;
            }
            header{
                display: flex;
                background:linear-gradient(135deg,#b8e0ff,#ffffff);
                padding: 24px 20px;
                border: 2px solid #e5e7eb;  
            }
            nav{
                /* background-color: black; */
                width: 100%;
                display: flex;
                align-items: center;
                justify-content:flex-end;
            }
            nav h1{
                position: absolute;
                /* background-color: bisque; */
                left: 50%;
                transform:translateX(-50%) ;
                font-size: 70px;
            }
            /* header div{
                background-color: red;
            } */
            .Home{
                border: 2px solid #000000;
                border-radius: 5px;
                padding: 5px 10px;
                background-color: rgb(149, 220, 226);
                font-size: 25px;
            }
            
            header img{
                width: 60px;
                height: auto;
                margin: 10px;    ;
            }
            body{
                background: linear-gradient(135deg, #ffffff 0%, #e2e6e8 100%);
                background-image: linear-gradient( 90deg,  rgba(44,115,210,1) 3.4%, rgb(149, 220, 226) 127.9% );
            }
            section{
                display: flex   ;
                flex-wrap:wrap;
                /* background-color: rebeccapurple; */
                background-color: white;
                border: 2px solid #e5e7eb;
                border-radius: 10px;
                box-shadow: 0px 8px 10px -2px rgba(0, 0, 0, 0.5);
                /* margin-left: 15%;
                margin-top: 10%;
                margin-right: 15%; */
                margin: 10% 15% 15% 15%;
            }
            .title{
                /* background-color: red; */
                width: 100%;
                text-align: center;
            }
            form>div{
                /* background-color: aqua; */
                border: 2px solid #e5e7eb;
                border-radius: 10px;
                box-shadow: 0px 8px 10px -2px rgba(0, 0, 0, 0.5);
                margin: 5% 0% 5% 10%;
                padding: 10px 20px 0px 10px;
                /* flex-direction:row; */
                width:100%;
                /* flex-wrap:wrap; */
            }
            form>div>div{
                /* background-color: pink; */
                display: flex;
                gap: 50px;
                margin: 0px 0px 10px 0px;
                /* justify-content: space-between; */
                
            }
            .field{
                /* background-color: rgb(253, 6, 6); */
                /* margin: 20px; */
                /* display: flex; */
                align-items: center;
                gap: 5px;
            }
            .field-lebel{
                display: flex;
                align-items: center;
                gap: 5px;
                /* margin-bottom: 1px; */

            }
            .field input,select{
                width: 100%;
                padding: 12px;
                border: 1px solid #d1d5db;
                border-radius: 10px;
            }
            .field img{
                width: 20px;
                height: auto;
            }
        </style>
    </head>
    <body>
        <header>
            <img src="telephone.png" alt="logo">
            <nav>
            <!-- <div class="title">     -->
            <h1>Contact</h1>
            <!-- </div> -->
                <a href="Portfolio.html" title="Home" target="_self" style="text-decoration: none; color: black;"><h3 class="Home">Home</h3></a>
            </nav>
        </header>
        <section>
            <h1 class="title">Give Your Details</h1>
            <form>
                <div>
                    <h3>Personal Information</h3>
                    <div>
                        <div class="field">
                            <div class="field-lebel">
                                <img src="Person Icon.png" alt="user icon">
                                <label for="name" style="color: grey;">Name :</label><br>
                            </div>
                            <input type="text" id="name" name="name" placeholder="Your Full Name" size="30">
                        </div>
                        <div class="field">
                            <div class="field-lebel">
                                <img src="Email Icon.png" alt="email icon">
                                <label for="email" style="color: grey;">Email :</label><br>
                            </div>
                            <input type="email" id="email" name="email" placeholder="Your Email Address" size="30">
                        </div>
                        <div class="field">
                            <div class="field-lebel">
                                <img src="Mobile Icon.png" alt="mobile icon">
                                <label for="mobile" style="color: grey;">Mobile :</label><br>
                            </div>
                            <input type="tel" pattern="[0-9]{10}" inputmode="numeric" id="mobile" name="mobile" placeholder="Your Mobile Number" maxlength="10" size="30">
                        </div>
                    </div>
                </div>
                <div>
                    <h3>Company Information</h3>
                    <div>
                        <div class="field">
                            <div class="field-lebel">
                                <img src="Company Icon.png" alt="company icon">
                                <label for="company Name" style="color: grey;">Company Name :</label><br>
                            </div>
                            <input type="text" id="company Name" name="company Name " placeholder="Your Company Name" size="30">
                        </div>
                        <div class="field">
                            <div class="field-lebel">
                                <img src="Email Icon.png" alt="email icon">
                                <label for="Company Email" style="color: grey;">Company Email :</label><br>
                            </div>
                            <input type="email" id="Company Email" name="Company Email" placeholder="Your Company Email" size="30">
                        </div>
                        <div class="field">
                            <div class="field-lebel">
                                <img src="Mobile Icon.png" alt="mobile icon">
                                <label for="Company Mobile" style="color: grey;">Company Mobile :</label><br>
                            </div>
                            <input type="tel" pattern="[0-9]{10}" inputmode="numeric" id="Company Mobile" name="Company Mobile" placeholder="Your Company Mobile Number" maxlength="10" size="30">
                        </div>
                    </div>
                </div>
                <div>
                    <h3>Business Category</h3>
                    <div>
                        <div class="field">
                            <div class="field-lebel">
                                <img src="Category Icon.png" alt="category icon">
                                <label for="Category" style="color: grey;">Business Category :</label><br>
                            </div>
                            <select id="Category" name="Category">
                                <option value="">Select Category</option>
                                <option value="Producers">Producers</option>
                                <option value="Providers">Providers</option>
                                <!-- <option value="Healthcare">Healthcare</option>
                                <option value="Finance">Finance</option>
                                <option value="Education">Education</option> -->
                            </select>
                        </div>
                        <div class="field">
                            <div class="field-lebel">
                                <img src="Subcategory Icon.png" alt="subcategory icon">
                                <label for="Subcategory" style="color: grey;">Subcategory :</label><br>
                            </div>
                            <select id="Subcategory" name="Subcategory">
                                <option value="">Select Subcategory</option>
                                <option value="Agriculture">Agriculture</option>
                                <option value="Manufacturing">Manufacturing</option>
                                <option value="Software">Software</option>
                                <option value="Consulting">Consulting</option>
                                <option value="Retail">Retail</option>
                            </select>
                        </div>
                    </div>
                </div>
            </form>
        </section>
    </body>
</html>
