<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Contact Us</title>
        <style>
            *{
                box-sizing: border-box;
                margin:0;
                padding:0;
            }
            header{
                display: flex;
                background:linear-gradient(135deg,#b8e0ff,#ffffff);
                padding: 24px 20px;
                border: 2px solid #e5e7eb;  
            }
            nav{
                /* background-color: black; */
                width: 100%;
                display: flex;
                align-items: center;
                justify-content:flex-end;
            }
            nav h1{
                position: absolute;
                /* background-color: bisque; */
                left: 50%;
                transform:translateX(-50%) ;
                font-size: 70px;
            }
            /* header div{
                background-color: red;
            } */
            .Home{
                border: 2px solid #000000;
                border-radius: 5px;
                padding: 5px 10px;
                background-color: rgb(149, 220, 226);
                font-size: 25px;
            }
            
            header img{
                width: 60px;
                height: auto;
                margin: 10px;    ;
            }
            body{
                background: linear-gradient(135deg, #ffffff 0%, #e2e6e8 100%);
                background-image: linear-gradient( 90deg,  rgba(44,115,210,1) 3.4%, rgb(149, 220, 226) 127.9% );
            }
            section{
                display: flex   ;
                flex-wrap:wrap;
                /* background-color: rebeccapurple; */
                background-color: white;
                border: 2px solid #e5e7eb;
                border-radius: 10px;
                box-shadow: 0px 8px 10px -2px rgba(0, 0, 0, 0.5);
                margin-left: 15%;
                margin-top: 10%;
                margin-right: 15%;
            }
            .title{
                /* background-color: red; */
                width: 100%;
                text-align: center;
            }
            form>div{
                /* display: flex; */
                /* background-color: aqua; */
                border: 2px solid #e5e7eb;
                border-radius: 10px;
                box-shadow: 0px 8px 10px -2px rgba(0, 0, 0, 0.5);
                margin: 10% 0% 10% 10%;
                padding-left: 10px;
                width: 100%;
                flex-wrap: wrap;
            }
            .name-in{
                display: flex;
                align-items: center;
                gap: 5px;
            }
            .name-in img{
                width: 20px;
                height: auto;
            }
        </style>
    </head>
    <body>
        <header>
            <img src="telephone.png" alt="logo">
            <nav>
            <!-- <div class="title">     -->
            <h1>Contact</h1>
            <!-- </div> -->
                <a href="Portfolio.html" title="Home" target="_self" style="text-decoration: none; color: black;"><h3 class="Home">Home</h3></a>
            </nav>
        </header>
        <section>
            <h1 class="title">Give Your Details</h1>
            <form>
                <div>
                    <h3 style="padding-bottom: 5%;">Personal Information</h3>
                    <div class="name-in">
                        <!-- <img src="Person Icon.png" alt="user icon"> -->
                        <!-- <div> -->
                            <img src="Person Icon.png" alt="user icon">
                            <label for="name" style="color: grey;">Name :</label><br>
                            <input type="text" id="name" name="name" placeholder="Enter your full name">
                        <!-- </div> -->
                    </div>
                </div>
            </form>
        </section>
    </body>
</html>
