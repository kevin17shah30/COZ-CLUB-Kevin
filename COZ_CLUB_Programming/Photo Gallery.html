<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Photo Gallery</title>
        <link rel="icon" type="image/x-icon" href="image-.png">
        <style>
            @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');
            *{
                margin:0;
                padding:0;
                box-sizing:border-box;
           }
            body {
                font-family:"Poppins",sans-serif;
                /* font-family: Arial, sans-serif; */
                padding-top: 80px;
                background:
                linear-gradient(
              rgba(18,18,18,.75),
              rgba(18,18,18,.55));
                min-height: 100vh;
            }
            .navbar{
                position: fixed;
                top:0;
                left: 0;
                width: 100%;
                height: 80px;
                background: rgba(18,18,18,0.65);
                border-bottom:1px solid rgba(255,255,255,.08);
                backdrop-filter: blur(15px);  
                box-shadow:
                    0 5px 10px rgba(0,0,0,0.4);

                /* padding: 0 5%; */
                /* background-color: #111827; */
                /* display: flex;
                justify-content: space-between;
                align-items: center;
                 */
                z-index: 1000;
            }
            .nav-container{
                /* background-color: antiquewhite; */
                max-width: 1300px;
                width: 100%;
                height: 100%;
                margin: auto;
                display: flex;
                justify-content: space-between;
                align-items: center;
                padding: 0 20px;
            }
            .nav-links{
                /* background-color: chartreuse; */
                list-style: none;
                display: flex;
                gap: 5rem;
            }
            .nav-links a{
                text-decoration: none;
                color: white;
                display: block;
                padding: 14px 16px;
                /* transition: 0.2s ease;     */
                /* border: 2px solid black; */
                /* margin: 10px; */
            }
            .nav-links li a:hover{
                color: #FF6A2A;
                background: rgba(255, 106, 42, 0.15);
                border-radius: 10px;
                transform: translateY(-1px);
                /* background-color:#FF6A2A;
                color: white;
                border-radius: 10px;
                transform:translateY(-1px); */
            }
            .nav-links a.active{
                color:#FF6A2A;
                font-weight:bold;
            }
            .brand-icon{
                width: 60px;
                height: auto;
                cursor: pointer;
            }
            .hero h1{
                color:#FFFFFF;
                text-align: center;
                font-size: 4rem;
                font-weight: 700;
            }
            .hero h1 span{
                color:#FF6A2A;
            }
            .hero p{
                color:#D1D5DB;
                font-size: 1.2rem;
                line-height: 1.8;
                text-align: center;
            }
            .hero{
                /* background-color: aqua; */
                max-width: 1300px;
                margin: 0 auto;
                padding:80px 20px 80px;
            }
            .gallery-section{
                /* background-color: blueviolet; */
                max-width: 1300px;  
                margin: 0 auto;
                padding: 80px 20px;
            }
            .gallery-section h2{
                color:#FFFFFF;
                font-size: 2.5rem;
                text-align: center;
                /* margin-bottom: 15px; */
            }
            .gallery-section p{
                color:#D1D5DB;
                text-align: center;
                font-size: 1rem;
                margin-bottom: 50px;
            }
            .gallery{
                /* max-width: 1300px; */
                display: grid;
                grid-template-columns: repeat(auto-fit,minmax(280px,1fr));
                gap:25px;
                align-items: start;
            }
            .photo{
                overflow:hidden;
                border-radius:18px;
                /* background:#1C1C1C; */
                cursor:pointer;
                transition:.3s ease;
            }
            .photo img{
                width: 100%;
                height: auto;
                display: block; 
                transition: 0.4s ease;
            }
            .photo:hover{
                transform:translateY(-6px);
                box-shadow: 0 15px 35px rgba(0,0,0,.35);
            }
            .photo:hover img{
                transform:scale(1.05);
            }
        </style>
    </head>
    <body>
        <header>
            <nav class="navbar">
                <div class="nav-container">
                    <div>
                        <img src="image-.png" title="Logo" alt="Brand logo" class="brand-icon">
                    </div>
                    <ul class="nav-links">
                        <li><a class="active" href="#">Home</a></li>
                        <li><a href="#">Camera</a></li>
                        <li><a href="#">Download</a></li>
                    </ul>
                </div>
            </nav>
        </header>
        <main>
            <section class="hero">
                <h1>Capture Every <span>Moment.</span></h1>
                <p>Discover all photographs from camera shots and downloaded memories.</p>
            </section>
            <section class="gallery-section">
                <h2>Gallery</h2>
                <p>Browse our complete collection of memories.</p>
                <div class="gallery">
                    <div class="photo">
                        <img src="Gallery Project Images\tiger-2535888_640.jpg" alt="tiger image">
                    </div>
                    <div class="photo">
                        <img src="Gallery Project Images\2d95e5886fc4c65a6778b5fee94a7d59.jpg" alt="image">
                    </div>
                    <div class="photo">
                        <img src="Gallery Project Images\pngtree-abstract-cloudy-background-beautiful-natural-streaks-of-sky-and-clouds-red-image_15684333.jpg" alt="sky image">
                    </div>
                    <div class="photo">
                        <img src="Gallery Project Images/41586_2015_Article_BF528452a_Figg_HTML.jpg" alt="image">
                    </div>
                    <div class="photo">
                        <img src="Gallery Project Images/pngtree-stunning-red-and-blue-smoke-images-for-download-image_16191211.jpg" alt="image">
                    </div>
                </div>
            </section>
        </main>
    </body>
</html>
